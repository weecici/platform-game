name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  check-and-release:
    name: Release unreleased version (if any)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v5

      - name: Check release status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="v$(node -p "require('./package.json').version")"
          echo "package.json version: $CURRENT_VERSION"

          if gh release view "$CURRENT_VERSION" > /dev/null 2>&1; then
            echo "✔ Release $CURRENT_VERSION already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "✘ No release for $CURRENT_VERSION — will create one."
            echo "should_release=true"      >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure git tag exists
        if: steps.check.outputs.should_release == 'true'
        env:
          TAG: ${{ steps.check.outputs.version }}
        run: |
          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already present."
          else
            echo "Creating tag $TAG at HEAD…"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.should_release == 'true'
        run: pnpm build

      - name: Generate changelog
        if: steps.check.outputs.should_release == 'true'
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release_notes.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.version }}
          body_path: /tmp/release_notes.md
