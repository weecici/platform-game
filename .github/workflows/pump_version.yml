name: Pump Version

# Fires on every push/PR-merge to main.
# Skips automatically on "[skip ci]" commits (our own version-bump commits).
#
# Actions used:
#   mathieudutour/github-tag-action@v6.2  — conventional-commit version detection
#   pnpm/action-setup@v5                  — PNPM setup
#   orhun/git-cliff-action@v4             — changelog generation from git history
#   softprops/action-gh-release@v2        — GitHub Release creation

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  pump:
    name: Detect bump, tag & release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # ── 1. Full history checkout (required by both tag action & git-cliff) ─
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── 2. PNPM (version read from packageManager in package.json) ──────────
      - name: Setup PNPM
        uses: pnpm/action-setup@v5

      # ── 3. Detect next version via conventional commits ──────────────────────
      #        dry_run:true  → outputs new_tag/release_type without pushing
      #        default_bump:false → exits cleanly with empty outputs if no
      #                             fix/feat/! commit is found
      - name: Detect version bump
        id: tagger
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: false
          tag_prefix: v

      # ── 4. Nothing to do? Stop here ─────────────────────────────────────────
      - name: Check if bump is needed
        if: steps.tagger.outputs.release_type == ''
        run: |
          echo "No fix/feat/! commits found — skipping version bump."
          exit 0

      # ── 5. Write the new version into package.json ──────────────────────────
      #        new_version is the semver string without "v" prefix (e.g. "1.0.1")
      - name: Bump package.json version
        if: steps.tagger.outputs.release_type != ''
        run: |
          npm version "${{ steps.tagger.outputs.new_version }}" --no-git-tag-version
          echo "package.json bumped to ${{ steps.tagger.outputs.new_tag }}"

      # ── 6. Commit package.json and push the semver tag ──────────────────────
      - name: Commit, tag and push
        if: steps.tagger.outputs.release_type != ''
        env:
          TAG: ${{ steps.tagger.outputs.new_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): bump version to ${TAG} [skip ci]"
          git tag "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      # ── 7. Install deps & build (produces dist/) ────────────────────────────
      - name: Install dependencies
        if: steps.tagger.outputs.release_type != ''
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.tagger.outputs.release_type != ''
        run: pnpm build

      # ── 8. Generate release notes with git-cliff ────────────────────────────
      #        --latest  → changelog for the range between the two most recent tags
      #        --strip header → omit the [changelog] header (we have none anyway)
      #        OUTPUT    → write to file instead of stdout
      #        GITHUB_REPO → embeds correct repo URL for commit links in template
      - name: Generate changelog
        if: steps.tagger.outputs.release_type != ''
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release_notes.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Append contributors section (GitHub usernames + avatars) ──────────
      #        Uses `gh api` to resolve each commit SHA → GitHub login, then
      #        renders avatar + @username link for each unique contributor.
      - name: Append contributors
        if: steps.tagger.outputs.release_type != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREV_TAG: ${{ steps.tagger.outputs.previous_tag }}
          TAG: ${{ steps.tagger.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"

          # Collect unique GitHub usernames for every non-merge commit in range
          USERS=$(git log "$RANGE" --format="%H" --no-merges \
            | while read -r sha; do
                gh api "repos/${REPO}/commits/${sha}" \
                  --jq '.author.login // empty' 2>/dev/null
              done \
            | grep -v '^$' | sort -u)

          if [ -n "$USERS" ]; then
            printf '\n### Contributors\n' >> /tmp/release_notes.md
            while IFS= read -r username; do
              printf '[![@%s](https://github.com/%s.png?size=32)](https://github.com/%s) [@%s](https://github.com/%s)\n' \
                "$username" "$username" "$username" "$username" "$username" \
                >> /tmp/release_notes.md
            done <<< "$USERS"
          fi

      # ── 10. Zip dist/ as a release asset ────────────────────────────────────
      - name: Package dist
        if: steps.tagger.outputs.release_type != ''
        env:
          TAG: ${{ steps.tagger.outputs.new_tag }}
        run: zip -r "cs105-${TAG}.zip" dist/

      # ── 11. Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.tagger.outputs.release_type != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.new_tag }}
          name: ${{ steps.tagger.outputs.new_tag }}
          body_path: /tmp/release_notes.md
          files: cs105-${{ steps.tagger.outputs.new_tag }}.zip
