# Configuration for git-cliff — https://git-cliff.org/docs/configuration
# Used by both pump_version and release workflows to generate release notes.
# CHANGELOG is never committed to the repo; it lives only as GitHub Release body.

[changelog]
header = ""
# Tera template (https://keats.github.io/tera/docs/) — rendered per release.
# commit.message is already the description-only (prefix stripped) when
# conventional_commits = true, so no extra processing is needed.
body = """
{% if version %}\
## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased — {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/weecici/platform-game/commit/{{ commit.id }}))\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% else %} by {{ commit.author.name }}{% endif %}
{% endfor %}
{% endfor %}\
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  # Breaking changes: type! or BREAKING CHANGE footer (git-cliff sets breaking=true)
  { breaking = true,   group = "⚠ Breaking Changes" },
  { message = "^feat", group = "Features" },
  { message = "^fix",  group = "Bug Fixes" },
  # Skip everything else (chore, docs, ci, refactor, style, perf, test…)
  { message = ".*",    skip = true },
]

protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]*\\.[0-9]*\\.[0-9]*"
sort_commits = "newest"

[remote.github]
owner = "weecici"
repo = "platform-game"
