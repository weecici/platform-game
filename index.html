<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkour Runner - CS105 3D Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* HUD Overlay */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #hud-top {
        display: flex;
        justify-content: space-between;
        padding: 20px 30px;
        color: #fff;
        font-size: 18px;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
      }
      #hud-top .stat {
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        padding: 8px 18px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255,255,255,0.6);
      }
      #crosshair::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      #crosshair::after {
        width: 100%;
        height: 2px;
        top: 50%;
        transform: translateY(-50%);
      }

      /* Start Screen */
      #start-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3d 100%);
        z-index: 100;
        color: #fff;
      }
      #start-screen h1 {
        font-size: 64px;
        font-weight: 900;
        background: linear-gradient(45deg, #00d4ff, #7b2fff, #ff2d95);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
        letter-spacing: 3px;
      }
      #start-screen .subtitle {
        font-size: 18px;
        color: rgba(255,255,255,0.5);
        margin-bottom: 50px;
      }
      #start-screen .btn {
        pointer-events: all;
        padding: 15px 50px;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(45deg, #7b2fff, #00d4ff);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        letter-spacing: 2px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 30px rgba(123, 47, 255, 0.4);
      }
      #start-screen .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 50px rgba(123, 47, 255, 0.6);
      }
      #start-screen .controls-info {
        margin-top: 40px;
        text-align: center;
        color: rgba(255,255,255,0.4);
        font-size: 14px;
        line-height: 2;
      }
      #start-screen .controls-info kbd {
        background: rgba(255,255,255,0.1);
        padding: 3px 10px;
        border-radius: 4px;
        border: 1px solid rgba(255,255,255,0.2);
        font-family: monospace;
      }

      /* Pause / Death overlay */
      .overlay-screen {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(5px);
        z-index: 90;
        color: #fff;
      }
      .overlay-screen.active {
        display: flex;
      }
      .overlay-screen h2 {
        font-size: 48px;
        margin-bottom: 20px;
      }
      .overlay-screen .btn {
        pointer-events: all;
        margin-top: 20px;
        padding: 12px 40px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(45deg, #7b2fff, #00d4ff);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .overlay-screen .btn:hover {
        transform: scale(1.05);
      }

      /* Loading */
      #loading {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0a0a2e;
        z-index: 200;
        color: #fff;
        transition: opacity 0.5s;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top-color: #7b2fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud" style="display: none;">
      <div id="hud-top">
        <div class="stat" id="hud-score">Score: 0</div>
        <div class="stat" id="hud-time">Time: 0.0s</div>
        <div class="stat" id="hud-speed">Speed: 0</div>
      </div>
      <div id="crosshair"></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
      <h1>PARKOUR RUNNER</h1>
      <p class="subtitle">CS105 - Computer Graphics Project</p>
      <button class="btn" id="btn-start">START GAME</button>
      <div class="controls-info">
        <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> - Move &nbsp;|&nbsp;
        <kbd>Space</kbd> - Jump &nbsp;|&nbsp;
        <kbd>Shift</kbd> - Sprint<br/>
        <kbd>Mouse</kbd> - Look Around &nbsp;|&nbsp;
        <kbd>P</kbd> - Pause &nbsp;|&nbsp;
        <kbd>G</kbd> - Toggle Debug GUI<br/>
        <kbd>R</kbd> - Restart &nbsp;|&nbsp;
        <kbd>1-7</kbd> - Spawn Shapes &nbsp;|&nbsp;
        <kbd>T</kbd> - Toggle Textures
      </div>
    </div>

    <!-- Death Screen -->
    <div class="overlay-screen" id="death-screen">
      <h2>YOU FELL!</h2>
      <p id="death-score">Score: 0</p>
      <button class="btn" id="btn-restart">TRY AGAIN</button>
    </div>

    <!-- Pause Screen -->
    <div class="overlay-screen" id="pause-screen">
      <h2>PAUSED</h2>
      <button class="btn" id="btn-resume">RESUME</button>
    </div>

    <!-- Loading Screen -->
    <div id="loading">
      <div class="loader"></div>
      <p>Loading...</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
